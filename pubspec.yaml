name: tostu_sahane
description: "Tek marka, çoklu şube yemek sipariş uygulaması."
publish_to: 'none'

version: 1.1.0+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  easy_localization: ^3.0.7+1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  google_maps_flutter: ^2.12.1
  webview_flutter: ^4.13.0
  url_launcher: ^6.3.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  cloud_firestore: ^5.6.12
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  printing: ^5.14.3
  pdf: ^3.12.0
  barcode: ^2.2.9
  share_plus: ^12.0.2
  crypto: ^3.0.6
  image_picker: ^1.2.2
  path_provider: ^2.1.6
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/tostusahanelogo.png
  adaptive_icon_background: "#EA004B"
  adaptive_icon_foreground: assets/images/tostusahanelogo.png
  windows:
    generate: true
    image_path: assets/images/tostusahanelogo.png
    icon_size: 256
  web:
    generate: true
    image_path: assets/images/tostusahanelogo.png

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/sounds/
    - assets/paytr/
