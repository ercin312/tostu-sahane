name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      use_mock_api:
        description: Use mock API (demo mode)
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: Build signed IPA and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60
    environment: testflight

    env:
      BUNDLE_ID: com.tostusahane.tostuSahane
      KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || 'ci-tostu-sahane-keychain' }}

    steps:
      - name: Require signing secrets
        run: |
          test -n "${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}" || (echo "Missing IOS_DIST_CERTIFICATE_BASE64" && exit 1)
          test -n "${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}" || (echo "Missing IOS_DIST_CERTIFICATE_PASSWORD" && exit 1)
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" || (echo "Missing IOS_PROVISIONING_PROFILE_BASE64" && exit 1)
          test -n "${{ secrets.APPLE_TEAM_ID }}" || (echo "Missing APPLE_TEAM_ID" && exit 1)
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" || (echo "Missing IOS_PROVISIONING_PROFILE_NAME" && exit 1)
          test -n "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" || (echo "Missing APPSTORE_CONNECT_ISSUER_ID" && exit 1)
          test -n "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" || (echo "Missing APPSTORE_CONNECT_API_KEY_ID" && exit 1)
          test -n "${{ secrets.APPSTORE_CONNECT_API_KEY }}" || (echo "Missing APPSTORE_CONNECT_API_KEY" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Firebase iOS config
        shell: bash
        run: |
          if [ -n "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" ]; then
            echo "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          else
            cp ios/Runner/GoogleService-Info.plist.example ios/Runner/GoogleService-Info.plist
            echo "::warning::IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 not set; using example plist."
          fi

      - name: Set CI build number
        run: |
          VERSION_NAME="$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)"
          echo "Using version ${VERSION_NAME}+${{ github.run_number }}"
          perl -0pi -e "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/m" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Install Apple distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: bash scripts/install_ios_signing_certificate.sh

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/install_ios_provisioning_profile.sh

      - name: Prepare ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: bash scripts/prepare_ios_export_options.sh

      - name: Configure manual code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: python3 scripts/configure_ios_manual_signing.py

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build signed IPA
        env:
          USE_MOCK_API: ${{ github.event_name == 'workflow_dispatch' && inputs.use_mock_api == true && 'true' || 'false' }}
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=USE_MOCK_API=${USE_MOCK_API}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
